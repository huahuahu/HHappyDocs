<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paste In Web</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #editor {
      flex-grow: 1;
      border: 1px solid gray;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h2 style="margin-top: 1em; padding-left: 1em;">Paste below</h2>
  <div contenteditable="true" id="editor">
    
  </div>
</body>
<script>
  // get h2 tag and update it with the text
  const h2 = document.querySelector('h2');
  if (navigator.language === "zh-CN") {
      h2.innerText = "粘贴在下面";
    } else {
      h2.innerText = "Paste below";
    }
</script>
</html>
